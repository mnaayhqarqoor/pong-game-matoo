<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }

        canvas {
            border: 3px solid #00ffc8;
            background-color: #0f3460;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
            display: block;
            margin: 0 auto;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-top: 20px;
            font-size: 1.5em;
        }

        .score {
            flex: 1;
            padding: 10px;
        }

        .player-score {
            color: #00ffc8;
        }

        .ai-score {
            color: #ff006e;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9em;
            color: #aaa;
        }

        .instructions p {
            margin: 5px 0;
        }

        .reset-button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #00ffc8;
            color: #0f3460;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background-color: #ff006e;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="scoreboard">
            <div class="score">
                <div>Player (Left)</div>
                <div class="player-score" id="playerScore">0</div>
            </div>
            <div class="score">
                <div>Computer (Right)</div>
                <div class="ai-score" id="aiScore">0</div>
            </div>
        </div>
        <div class="instructions">
            <p>Use <strong>Arrow Up/Down</strong> or <strong>Mouse Movement</strong> to control your paddle</p>
            <p>First to 5 wins!</p>
        </div>
        <button class="reset-button" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 80;
        const BALL_SIZE = 8;
        const MAX_SCORE = 5;

        // Paddle objects
        const player = {
            x: 20,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            speed: 7,
            score: 0
        };

        const computer = {
            x: canvas.width - PADDLE_WIDTH - 20,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            speed: 5.5,
            score: 0
        };

        // Ball object
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: BALL_SIZE,
            velocityX: 5,
            velocityY: 5,
            maxVelocity: 8
        };

        let gameRunning = true;
        let mouseY = canvas.height / 2;

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && player.y > 0) {
                player.dy = -player.speed;
            }
            if (e.key === 'ArrowDown' && player.y < canvas.height - player.height) {
                player.dy = player.speed;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                player.dy = 0;
            }
        });

        // Mouse movement control
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Draw functions
        function drawRect(x, y, width, height, color = 'white') {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, size, color = 'white') {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, size = '20px', color = 'white') {
            ctx.fillStyle = color;
            ctx.font = `${size} Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(text, x, y);
        }

        function drawMiddleLine() {
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.2)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Update player paddle
        function updatePlayer() {
            // Keyboard control
            player.y += player.dy;

            // Mouse control (alternative)
            const mouseControl = false; // Set to true to use mouse control
            if (mouseControl) {
                player.y = mouseY - player.height / 2;
            }

            // Boundary check
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        // Update computer paddle (AI)
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // AI follows the ball with some difficulty adjustment
            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Boundary check
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball
        function updateBall() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Top and bottom wall collision
            if (ball.y - ball.size < 0) {
                ball.y = ball.size;
                ball.velocityY = -ball.velocityY;
            }
            if (ball.y + ball.size > canvas.height) {
                ball.y = canvas.height - ball.size;
                ball.velocityY = -ball.velocityY;
            }

            // Player paddle collision
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.x = player.x + player.width + ball.size;
                ball.velocityX = -ball.velocityX;

                // Add spin based on paddle movement
                const deltaY = ball.y - (player.y + player.height / 2);
                ball.velocityY = deltaY * 0.2;

                // Increase speed slightly (cap at maxVelocity)
                if (Math.abs(ball.velocityX) < ball.maxVelocity) {
                    ball.velocityX *= 1.05;
                }
            }

            // Computer paddle collision
            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.x = computer.x - ball.size;
                ball.velocityX = -ball.velocityX;

                // Add spin based on paddle movement
                const deltaY = ball.y - (computer.y + computer.height / 2);
                ball.velocityY = deltaY * 0.2;

                // Increase speed slightly (cap at maxVelocity)
                if (Math.abs(ball.velocityX) < ball.maxVelocity) {
                    ball.velocityX *= 1.05;
                }
            }

            // Score points
            if (ball.x - ball.size < 0) {
                computer.score++;
                updateScore();
                resetBall();
                checkGameOver();
            }
            if (ball.x + ball.size > canvas.width) {
                player.score++;
                updateScore();
                resetBall();
                checkGameOver();
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = 5 * (Math.random() > 0.5 ? 1 : -1);
            ball.velocityY = (Math.random() - 0.5) * 4;
        }

        // Update scoreboard
        function updateScore() {
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('aiScore').textContent = computer.score;
        }

        // Check for game over
        function checkGameOver() {
            if (player.score >= MAX_SCORE || computer.score >= MAX_SCORE) {
                gameRunning = false;
                const winner = player.score >= MAX_SCORE ? 'Player' : 'Computer';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawText(`${winner} Wins!`, canvas.width / 2, canvas.height / 2 - 20, '40px', '#00ffc8');
                drawText('Press Reset Game to play again', canvas.width / 2, canvas.height / 2 + 30, '16px', '#aaa');
            }
        }

        // Render game
        function render() {
            // Clear canvas
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw middle line
            drawMiddleLine();

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#00ffc8');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#ff006e');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.size, 'white');
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                updatePlayer();
                updateComputer();
                updateBall();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        // Reset game function
        function resetGame() {
            player.score = 0;
            computer.score = 0;
            gameRunning = true;
            player.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            computer.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            resetBall();
            updateScore();
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
