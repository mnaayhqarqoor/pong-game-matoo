<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 لعبة Pong - ضد الكمبيوتر</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
      padding: 20px;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 2.2rem;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
      text-align: center;
    }

    .score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .score-value {
      font-size: 2.5rem;
      color: #00ffff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
    }

    .controls-info {
      margin: 15px 0;
      text-align: center;
      font-size: 1rem;
      color: #aaa;
      max-width: 500px;
    }

    canvas {
      background: #0a0a1a;
      border: 3px solid #00ffff;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      max-width: 100%;
      height: auto;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(45deg, #00ffff, #0080ff);
      color: #0a0a1a;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 255, 255, 0.7);
    }

    button:active {
      transform: translateY(1px);
    }

    .difficulty {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty label {
      font-size: 0.95rem;
    }

    .difficulty select {
      padding: 8px 15px;
      border-radius: 25px;
      border: 2px solid #00ffff;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    .game-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 46, 0.95);
      padding: 30px 50px;
      border-radius: 20px;
      border: 2px solid #00ffff;
      text-align: center;
      display: none;
      z-index: 10;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }

    .game-message.show {
      display: block;
    }

    .game-message h2 {
      margin-bottom: 15px;
      color: #00ffff;
      font-size: 1.8rem;
    }

    .game-message p {
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: #ccc;
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .score-board { gap: 25px; font-size: 1.2rem; }
      .score-value { font-size: 2rem; }
      canvas { width: 100%; max-width: 480px; }
      button { padding: 10px 25px; font-size: 1rem; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .score-board { gap: 15px; font-size: 1rem; }
      .score-value { font-size: 1.8rem; }
      .controls-info { font-size: 0.9rem; }
      .game-message { padding: 20px 30px; }
    }
  </style>
</head>
<body>
  <h1>🎮 لعبة Pong - ضد الكمبيوتر</h1>

  <div class="score-board">
    <div class="score">
      <span>أنت</span>
      <span id="playerScore" class="score-value">0</span>
    </div>
    <div class="score">
      <span>الكمبيوتر</span>
      <span id="computerScore" class="score-value">0</span>
    </div>
  </div>

  <div class="controls-info">
    🖱️ حرك الماوس لأعلى ولأسفل للتحكم في المضرب<br>
    ⌨️ أو استخدم الأسهم ↑ ↓ للتحكم
  </div>

  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div class="buttons">
    <button id="startBtn">▶️ ابدأ اللعبة</button>
    <button id="resetBtn">🔄 إعادة تعيين</button>
  </div>

  <div class="difficulty">
    <label for="difficultySelect">مستوى الصعوبة:</label>
    <select id="difficultySelect">
      <option value="easy">سهل 😊</option>
      <option value="medium" selected>متوسط 😐</option>
      <option value="hard">صعب 😈</option>
    </select>
  </div>

  <div id="gameMessage" class="game-message">
    <h2 id="messageTitle">🎉 مبروك!</h2>
    <p id="messageText">لقد فزت باللعبة!</p>
    <button id="playAgainBtn">🔄 العب مرة أخرى</button>
  </div>

  <script>
    // ==================== إعدادات اللعبة ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // عناصر DOM
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const difficultySelect = document.getElementById('difficultySelect');
    const gameMessage = document.getElementById('gameMessage');
    const messageTitle = document.getElementById('messageTitle');
    const messageText = document.getElementById('messageText');
    const playAgainBtn = document.getElementById('playAgainBtn');

    // متغيرات اللعبة
    let gameRunning = false;
    let animationId;
    
    // إعدادات الصعوبة
    const difficultySettings = {
      easy: { aiSpeed: 3, aiError: 0.4 },
      medium: { aiSpeed: 5, aiError: 0.2 },
      hard: { aiSpeed: 8, aiError: 0.05 }
    };

    // كائنات اللعبة
    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 10,
      speed: 6,
      dx: 4,
      dy: 2,
      color: '#00ffff'
    };

    const paddleWidth = 12;
    const paddleHeight = 100;

    const player = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      speed: 8,
      color: '#00ff88',
      score: 0
    };

    const computer = {
      x: canvas.width - 20 - paddleWidth,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      speed: 5,
      color: '#ff6b6b',
      score: 0
    };

    // التحكم بالماوس
    canvas.addEventListener('mousemove', (e) => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const mouseY = e.clientY - rect.top;
      player.y = mouseY - player.height / 2;
      keepPaddleInBounds(player);
    });

    // التحكم بلوحة المفاتيح
    document.addEventListener('keydown', (e) => {
      if (!gameRunning) return;
      if (e.key === 'ArrowUp') {
        player.y -= 20;
        keepPaddleInBounds(player);
      } else if (e.key === 'ArrowDown') {
        player.y += 20;
        keepPaddleInBounds(player);
      }
    });

    // منع التمرير بالأسهم
    window.addEventListener('keydown', (e) => {
      if(['ArrowUp','ArrowDown','Space'].includes(e.code)) {
        e.preventDefault();
      }
    });

    function keepPaddleInBounds(paddle) {
      if (paddle.y < 0) paddle.y = 0;
      if (paddle.y + paddle.height > canvas.height) {
        paddle.y = canvas.height - paddle.height;
      }
    }

    // ==================== وظائف الرسم ====================
    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawNet() {
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function draw() {
      // مسح الشاشة
      drawRect(0, 0, canvas.width, canvas.height, '#0a0a1a');
      
      // رسم الشبكة
      drawNet();
      
      // رسم المضارب
      drawRect(player.x, player.y, player.width, player.height, player.color);
      drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
      
      // رسم الكرة
      drawCircle(ball.x, ball.y, ball.radius, ball.color);
      
      // تأثير توهج للكرة
      ctx.shadowBlur = 15;
      ctx.shadowColor = ball.color;
      drawCircle(ball.x, ball.y, ball.radius, ball.color);
      ctx.shadowBlur = 0;
    }

    // ==================== منطق اللعبة ====================
    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = 6;
      
      // اتجاه عشوائي
      const direction = Math.random() > 0.5 ? 1 : -1;
      const angle = (Math.random() * Math.PI / 4) - Math.PI / 8;
      ball.dx = direction * ball.speed * Math.cos(angle);
      ball.dy = ball.speed * Math.sin(angle);
    }

    function update() {
      if (!gameRunning) return;

      // تحريك الكرة
      ball.x += ball.dx;
      ball.y += ball.dy;

      // ارتداد الكرة من الحواف العلوية والسفلية
      if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.dy *= -1;
        ball.y = ball.y < canvas.height/2 ? ball.radius : canvas.height - ball.radius;
      }

      // اكتشاف التصادم مع المضارب
      if (
        ball.x - ball.radius < player.x + player.width &&
        ball.x + ball.radius > player.x &&
        ball.y > player.y &&
        ball.y < player.y + player.height
      ) {
        handlePaddleCollision(player);
      }

      if (
        ball.x + ball.radius > computer.x &&
        ball.x - ball.radius < computer.x + computer.width &&
        ball.y > computer.y &&
        ball.y < computer.y + computer.height
      ) {
        handlePaddleCollision(computer);
      }

      // تسجيل النقاط
      if (ball.x < 0) {
        computer.score++;
        computerScoreEl.textContent = computer.score;
        checkWinCondition();
        resetBall();
      } else if (ball.x > canvas.width) {
        player.score++;
        playerScoreEl.textContent = player.score;
        checkWinCondition();
        resetBall();
      }

      // ذكاء الكمبيوتر
      moveComputerAI();

      // تحديث موضع اللاعب (للتحكم بلوحة المفاتيح)
      player.y += player.dy;
      keepPaddleInBounds(player);
    }

    function handlePaddleCollision(paddle) {
      // عكس اتجاه الكرة
      ball.dx *= -1;
      
      // زيادة سرعة الكرة قليلاً
      ball.speed += 0.3;
      
      // تعديل زاوية الكرة بناءً على مكان الاصطدام بالمضرب
      const collidePoint = (ball.y - (paddle.y + paddle.height/2)) / (paddle.height/2);
      ball.dy = ball.speed * collidePoint * 0.7;
      
      // منع الكرة من التوقف عمودياً
      if (Math.abs(ball.dy) < 1) {
        ball.dy = ball.dy > 0 ? 1 : -1;
      }
    }

    function moveComputerAI() {
      const settings = difficultySettings[difficultySelect.value];
      computer.speed = settings.aiSpeed;
      
      // محاكاة خطأ الذكاء الاصطناعي
      if (Math.random() > settings.aiError) {
        const computerCenter = computer.y + computer.height / 2;
        const diff = ball.y - computerCenter;
        
        if (Math.abs(diff) > 10) {
          computer.y += Math.sign(diff) * computer.speed;
        }
      }
      
      keepPaddleInBounds(computer);
    }

    function checkWinCondition() {
      const winScore = 5;
      if (player.score >= winScore || computer.score >= winScore) {
        gameRunning = false;
        cancelAnimationFrame(animationId);
        
        if (player.score > computer.score) {
          messageTitle.textContent = '🎉 مبروك!';
          messageText.textContent = `لقد فزت! ${player.score} - ${computer.score}`;
        } else {
          messageTitle.textContent = '😢 حاول مرة أخرى';
          messageText.textContent = `فاز الكمبيوتر! ${computer.score} - ${player.score}`;
        }
        gameMessage.classList.add('show');
      }
    }

    function gameLoop() {
      update();
      draw();
      if (gameRunning) {
        animationId = requestAnimationFrame(gameLoop);
      }
    }

    // ==================== أزرار التحكم ====================
    startBtn.addEventListener('click', () => {
      if (gameRunning) return;
      
      gameRunning = true;
      gameMessage.classList.remove('show');
      resetBall();
      gameLoop();
      startBtn.textContent = '⏸️ إيقاف مؤقت';
    });

    resetBtn.addEventListener('click', () => {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      player.score = 0;
      computer.score = 0;
      playerScoreEl.textContent = '0';
      computerScoreEl.textContent = '0';
      player.y = canvas.height/2 - player.height/2;
      computer.y = canvas.height/2 - computer.height/2;
      resetBall();
      draw();
      startBtn.textContent = '▶️ ابدأ اللعبة';
      gameMessage.classList.remove('show');
    });

    playAgainBtn.addEventListener('click', () => {
      resetBtn.click();
      startBtn.click();
    });

    // تغيير الصعوبة أثناء اللعبة
    difficultySelect.addEventListener('change', () => {
      if (gameRunning) {
        computer.speed = difficultySettings[difficultySelect.value].aiSpeed;
      }
    });

    // ==================== التهيئة الأولية ====================
    // دعم اللمس للأجهزة المحمولة
    canvas.addEventListener('touchmove', (e) => {
      if (!gameRunning) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touchY = e.touches[0].clientY - rect.top;
      player.y = touchY - player.height / 2;
      keepPaddleInBounds(player);
    }, { passive: false });

    // رسم الشاشة الأولية
    draw();
    
    // رسالة ترحيبية
    setTimeout(() => {
      messageTitle.textContent = '🎮 مرحباً بك!';
      messageText.textContent = 'اضغط على "ابدأ اللعبة" للعب ضد الكمبيوتر';
      gameMessage.classList.add('show');
    }, 500);
  </script>
</body>
</html>
